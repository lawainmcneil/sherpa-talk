<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHERPA — Agentic AI for the Modern RIA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0D1B2E;
    --navy2: #1A2F4A;
    --gold: #C9A96E;
    --gold2: #E8C98A;
    --slate: #8A9BB0;
    --offwhite: #F5F1EB;
    --accent: #3A7BD5;
    --danger: #C45C3A;
    --success: #2E8B6A;
  }
  html, body { height: 100%; background: var(--navy); }
  body { font-family: 'DM Sans', sans-serif; color: var(--offwhite); }

  .wrap { min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: linear-gradient(135deg, #0D1B2E 0%, #1A2F4A 60%, #0D2340 100%);
    border-bottom: 1px solid rgba(201,169,110,0.3);
    padding: 28px 32px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.1);
  }
  .header::before {
    content: '';
    position: absolute;
    right: 20px; top: 20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.07);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .brand { font-family: 'DM Serif Display', serif; font-size: 32px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  .brand span { font-style: italic; color: var(--gold2); }
  .timer-block { text-align: right; }
  .timer { font-size: 36px; font-weight: 300; color: var(--gold2); letter-spacing: 2px; line-height: 1; }
  .timer-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); margin-top: 2px; }
  .subtitle { font-size: 13px; color: var(--slate); letter-spacing: 1px; text-transform: uppercase; }
  .progress-bar { height: 2px; background: rgba(201,169,110,0.15); margin: 18px 0 0; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }

  .nav {
    display: flex;
    gap: 0;
    padding: 0 32px;
    background: rgba(26,47,74,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none;
    border: none;
    color: var(--slate);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-btn:hover { color: var(--offwhite); }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .content { padding: 28px 32px; flex: 1; }
  .slide { display: none; }
  .slide.active { display: block; animation: fadeSlide 0.3s ease; }

  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,169,110,0.12);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .slide-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--offwhite); margin-bottom: 6px; line-height: 1.2; }
  .slide-hook { font-size: 14px; color: var(--slate); margin-bottom: 24px; font-style: italic; line-height: 1.5; }

  .points { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .point {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
    transition: all 0.2s;
    cursor: default;
  }
  .point:hover { background: rgba(201,169,110,0.07); border-color: rgba(201,169,110,0.2); }
  .point-num { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); opacity: 0.5; line-height: 1; flex-shrink: 0; width: 28px; }
  .point-head { font-size: 14px; font-weight: 500; color: var(--offwhite); margin-bottom: 4px; }
  .point-sub { font-size: 13px; color: var(--slate); line-height: 1.5; }

  .highlight-box {
    background: rgba(201,169,110,0.08);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin: 16px 0;
  }
  .highlight-box p { font-size: 14px; color: var(--gold2); line-height: 1.6; font-style: italic; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px; }
  .card-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--slate); margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 500; color: var(--offwhite); margin-bottom: 6px; }
  .card p { font-size: 13px; color: var(--slate); line-height: 1.5; }
  .card.gold-border { border-color: rgba(201,169,110,0.3); background: rgba(201,169,110,0.05); }
  .card.danger-border { border-color: rgba(196,92,58,0.3); background: rgba(196,92,58,0.05); }

  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--gold); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--slate); letter-spacing: 1px; text-transform: uppercase; }

  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; margin: 2px; }
  .tag-gold { background: rgba(201,169,110,0.15); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
  .tag-red { background: rgba(196,92,58,0.15); color: #E8906A; border: 1px solid rgba(196,92,58,0.3); }
  .tag-green { background: rgba(46,139,106,0.15); color: #5BBFA0; border: 1px solid rgba(46,139,106,0.3); }
  .tag-blue { background: rgba(58,123,213,0.15); color: #7AAEE8; border: 1px solid rgba(58,123,213,0.3); }

  .footer-btns {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .nav-arrow {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .nav-arrow:hover { background: rgba(201,169,110,0.12); border-color: rgba(201,169,110,0.3); color: var(--gold2); }
  .nav-arrow.primary { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 500; }
  .nav-arrow.primary:hover { background: var(--gold2); }
  .slide-count { font-size: 12px; color: var(--slate); letter-spacing: 1px; }

  .closing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .cta-box { background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(201,169,110,0.04)); border: 1px solid rgba(201,169,110,0.25); border-radius: 12px; padding: 20px; text-align: center; }
  .cta-icon { font-size: 24px; margin-bottom: 8px; }
  .cta-title { font-size: 14px; font-weight: 500; color: var(--gold2); margin-bottom: 6px; }
  .cta-desc { font-size: 12px; color: var(--slate); line-height: 1.5; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .two-col, .closing-grid { grid-template-columns: 1fr; }
    .stat-row { grid-template-columns: 1fr 1fr; }
    .content { padding: 20px 16px; }
    .header { padding: 20px 16px 16px; }
    .footer-btns { padding: 12px 16px 20px; }
    .nav { padding: 0 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="brand">Sher<span>pa</span></div>
        <div class="subtitle">Agentic AI for the Modern RIA</div>
      </div>
      <div class="timer-block">
        <div class="timer" id="clock">15:00</div>
        <div class="timer-label">Remaining</div>
        <div style="margin-top:6px;display:flex;gap:6px;justify-content:flex-end">
          <button onclick="startTimer()" style="background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;font-family:'DM Sans',sans-serif;">START</button>
          <button onclick="resetTimer()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--slate);font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;font-family:'DM Sans',sans-serif;">RESET</button>
        </div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:14.3%"></div>
    </div>
  </div>

  <div class="nav" id="nav-tabs"></div>
  <div class="content" id="content-area"></div>

  <div class="footer-btns">
    <button class="nav-arrow" onclick="prevSlide()">← Back</button>
    <span class="slide-count" id="slide-count">1 / 7</span>
    <button class="nav-arrow primary" onclick="nextSlide()">Next →</button>
  </div>
</div>

<script>
const slides = [
  {
    tab: "The Problem",
    time: "0:00–2:00",
    title: "The AdvisorTech Sprawl",
    hook: "Open your phone. Count the apps. Now multiply that by a practice.",
    content: `
      <div class="stat-row">
        <div class="stat"><div class="stat-num">296+</div><div class="stat-label">Tools on the map</div></div>
        <div class="stat"><div class="stat-num">18</div><div class="stat-label">Avg apps per firm</div></div>
        <div class="stat"><div class="stat-num">3x</div><div class="stat-label">Overlap in core functions</div></div>
      </div>
      <div class="highlight-box"><p>"Every vendor promised to simplify your practice. Together, they did the opposite. You now manage vendor relationships instead of client relationships."</p></div>
      <div class="points">
        <div class="point"><div class="point-num">01</div><div class="point-body"><div class="point-head">Context lives in 12 different systems</div><div class="point-sub">Your team wastes hours re-entering data, switching tabs, and reconciling information that should talk to each other.</div></div></div>
        <div class="point"><div class="point-num">02</div><div class="point-body"><div class="point-head">Every new tool creates a training burden</div><div class="point-sub">Onboarding new team members means teaching a software maze, not teaching your investment philosophy.</div></div></div>
        <div class="point"><div class="point-num">03</div><div class="point-body"><div class="point-head">The client never sees any of it — they just see friction</div><div class="point-sub">Slow responses, inconsistent service, advisors distracted by operations. The tech was supposed to fix this.</div></div></div>
      </div>`
  },
  {
    tab: "What's Changing",
    time: "2:00–4:30",
    title: "Agentic AI Changes the Equation",
    hook: "The last wave of AI gave you a smarter search box. This wave gives you a team member.",
    content: `
      <div class="two-col">
        <div class="card">
          <div class="card-label">Before — Generative AI</div>
          <div class="card-title">Answer engines</div>
          <p>Ask a question, get a response. You still do the work. Every prompt starts from zero. No memory, no action, no follow-through.</p>
          <div style="margin-top:12px"><span class="tag tag-blue">ChatGPT</span><span class="tag tag-blue">Copilot</span><span class="tag tag-blue">Gemini</span></div>
        </div>
        <div class="card gold-border">
          <div class="card-label">Now — Agentic AI</div>
          <div class="card-title">Action takers</div>
          <p>Give it a goal. It reasons, plans, accesses systems, and executes multi-step workflows. It learns your practice over time.</p>
          <div style="margin-top:12px"><span class="tag tag-gold">Autonomous</span><span class="tag tag-gold">Multi-step</span><span class="tag tag-gold">Context-aware</span></div>
        </div>
      </div>
      <div class="points">
        <div class="point"><div class="point-num">01</div><div class="point-body"><div class="point-head">It connects to your existing systems</div><div class="point-sub">CRM, custodian data, calendar, email — an agent can pull from all of them in a single workflow. No re-entry.</div></div></div>
        <div class="point"><div class="point-num">02</div><div class="point-body"><div class="point-head">It acts, not just advises</div><div class="point-sub">Draft the review prep, flag the portfolio drift, send the follow-up, schedule the meeting. End to end. One instruction.</div></div></div>
        <div class="point"><div class="point-num">03</div><div class="point-body"><div class="point-head">It scales your judgment, not just your hours</div><div class="point-sub">The agent carries your firm's process — your way of doing things — to every client interaction, every time.</div></div></div>
      </div>`
  },
  {
    tab: "The Vision",
    time: "4:30–7:00",
    title: "The SHERPA Model",
    hook: "A Sherpa doesn't carry you up the mountain. They know the terrain so you can focus on the summit.",
    content: `
      <div class="highlight-box"><p>"Not one app that does everything. Intelligent micro-solutions woven together by an agent that understands your practice — eliminating bloat, preserving relationships."</p></div>
      <div class="points">
        <div class="point"><div class="point-num">S</div><div class="point-body"><div class="point-head">Situational awareness at scale</div><div class="point-sub">Know what every client needs before they ask. The agent surfaces the right information at the right moment — life events, portfolio triggers, service gaps.</div></div></div>
        <div class="point"><div class="point-num">H</div><div class="point-body"><div class="point-head">Human relationship at the center</div><div class="point-sub">Every automation exists to give you more face time, more presence, more mentorship capacity — not to replace the advisor.</div></div></div>
        <div class="point"><div class="point-num">E</div><div class="point-body"><div class="point-head">Execution without hand-holding</div><div class="point-sub">Your team follows your process because the agent models it. New hires ramp faster. Senior advisors mentor, not manage.</div></div></div>
        <div class="point"><div class="point-num">R</div><div class="point-body"><div class="point-head">Responsive to your specific practice</div><div class="point-sub">Not a generic solution. Trained on how you serve clients — your language, your cadence, your standards.</div></div></div>
        <div class="point"><div class="point-num">P</div><div class="point-body"><div class="point-head">Practice intelligence, not practice management</div><div class="point-sub">Stop managing software. Start making decisions informed by a system that actually understands your business.</div></div></div>
      </div>`
  },
  {
    tab: "Real Applications",
    time: "7:00–9:30",
    title: "What This Looks Like in Practice",
    hook: "Concrete scenarios your team could be running inside 90 days.",
    content: `
      <div class="points">
        <div class="point"><div class="point-num">→</div><div class="point-body"><div class="point-head">Client review prep — automated</div><div class="point-sub">Agent pulls CRM notes, portfolio performance, pending tasks, and household changes. Generates a briefing doc. Advisor walks in fully prepared, not scrambling.</div></div></div>
        <div class="point"><div class="point-num">→</div><div class="point-body"><div class="point-head">Prospect pipeline intelligence</div><div class="point-sub">Agent monitors engagement signals across email, calendar, and client portals. Flags cold prospects, surfaces warm ones, drafts outreach in your voice.</div></div></div>
        <div class="point"><div class="point-num">→</div><div class="point-body"><div class="point-head">Compliance-ready communication drafts</div><div class="point-sub">New team member writes a client email. Agent reviews against your firm's standards and suggests edits before it goes out. Quality control without micromanaging.</div></div></div>
        <div class="point"><div class="point-num">→</div><div class="point-body"><div class="point-head">Life event triggers</div><div class="point-sub">Custodian data shows a large distribution. Agent cross-references client profile, flags a potential planning conversation, drafts a check-in message for advisor approval.</div></div></div>
        <div class="point"><div class="point-num">→</div><div class="point-body"><div class="point-head">Team mentoring codified</div><div class="point-sub">Your process, captured. A new advisor asks how to handle a complex estate situation — the agent surfaces the right framework, the right precedents from your practice, the right next step.</div></div></div>
      </div>`
  },
  {
    tab: "Risks",
    time: "9:30–11:30",
    title: "The Risks You Have to Own",
    hook: "Anyone selling you AI without talking about this isn't being straight with you.",
    content: `
      <div class="two-col">
        <div class="card danger-border">
          <div class="card-label">Fiduciary Risk</div>
          <div class="card-title">The AI is not the advisor</div>
          <p>Every client-facing output needs a human review gate. Automation accelerates delivery — it does not replace professional judgment or regulatory accountability.</p>
          <div style="margin-top:10px"><span class="tag tag-red">Reg BI</span><span class="tag tag-red">Suitability</span><span class="tag tag-red">Disclosure</span></div>
        </div>
        <div class="card danger-border">
          <div class="card-label">Data Risk</div>
          <div class="card-title">Where does your data go?</div>
          <p>Every system you connect to an AI agent is a potential exposure point. Vet your vendors. Know where client data is processed and stored. Demand SOC 2 Type II.</p>
          <div style="margin-top:10px"><span class="tag tag-red">Privacy</span><span class="tag tag-red">Custody</span><span class="tag tag-red">Encryption</span></div>
        </div>
      </div>
      <div class="two-col">
        <div class="card danger-border">
          <div class="card-label">Drift Risk</div>
          <div class="card-title">Automation erodes skill</div>
          <p>If your team stops writing proposals because the agent writes them — they stop learning. Use AI to augment developing skills, not to skip development entirely.</p>
        </div>
        <div class="card danger-border">
          <div class="card-label">Trust Risk</div>
          <div class="card-title">Clients notice inauthenticity</div>
          <p>A client who suspects their relationship is being managed by software will leave. The agent should make you more present, not less. That's the design test.</p>
        </div>
      </div>
      <div class="highlight-box"><p>"The risk isn't that AI does too much. It's that you let it replace the parts of your practice that only you can do."</p></div>`
  },
  {
    tab: "The Opportunity",
    time: "11:30–14:00",
    title: "Why Now, Why You",
    hook: "The RIAs who build this muscle in the next 18 months will be structurally different from everyone who waits.",
    content: `
      <div class="stat-row">
        <div class="stat"><div class="stat-num">$84T</div><div class="stat-label">Intergenerational wealth transfer underway</div></div>
        <div class="stat"><div class="stat-num">37%</div><div class="stat-label">Of advisor time on non-client tasks</div></div>
        <div class="stat"><div class="stat-num">4.8x</div><div class="stat-label">Revenue per advisor at tech-forward RIAs</div></div>
      </div>
      <div class="points">
        <div class="point"><div class="point-num">01</div><div class="point-body"><div class="point-head">Client acquisition advantage</div><div class="point-sub">Next-gen wealth holders expect responsiveness and personalization that most advisory firms can't deliver manually. SHERPA closes that gap.</div></div></div>
        <div class="point"><div class="point-num">02</div><div class="point-body"><div class="point-head">Team leverage without headcount</div><div class="point-sub">Grow AUM without proportionally growing your operations team. The agent absorbs the administrative load as you scale.</div></div></div>
        <div class="point"><div class="point-num">03</div><div class="point-body"><div class="point-head">Your practice becomes transferable</div><div class="point-sub">When your process is codified in an intelligent system, succession and M&A become cleaner. The value isn't just you — it's your documented, repeatable approach.</div></div></div>
      </div>`
  },
  {
    tab: "Close",
    time: "14:00–15:00",
    title: "The Question to Leave With",
    hook: "Not: can I afford to invest in this? But: can I afford to be three years behind when it matters?",
    content: `
      <div class="closing-grid">
        <div class="cta-box">
          <div class="cta-icon">◈</div>
          <div class="cta-title">Audit your stack</div>
          <div class="cta-desc">List every tool you pay for. Ask which ones you'd rebuild today if you started over.</div>
        </div>
        <div class="cta-box">
          <div class="cta-icon">◎</div>
          <div class="cta-title">Identify one workflow</div>
          <div class="cta-desc">Pick the most painful, repetitive process in your practice. That's your pilot.</div>
        </div>
        <div class="cta-box">
          <div class="cta-icon">◐</div>
          <div class="cta-title">Protect the relationship</div>
          <div class="cta-desc">Design the automation around the advisor-client bond, not around the software vendor's feature list.</div>
        </div>
      </div>
      <div class="highlight-box"><p>"The best technology in an advisory practice is invisible. Clients feel better served. Advisors feel less stretched. Teams feel actually mentored. That's the standard SHERPA is built to meet."</p></div>
      <div style="margin-top:20px;padding:18px;background:rgba(201,169,110,0.06);border:1px solid rgba(201,169,110,0.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold);letter-spacing:2px;text-transform:uppercase">SHERPA</div>
          <div style="font-size:12px;color:var(--slate);margin-top:2px">Intelligently integrated. Relationship first.</div>
        </div>
        <div style="font-size:12px;color:var(--slate);text-align:right">
          <div style="color:var(--offwhite);margin-bottom:3px">Questions welcome</div>
          <div>15 minutes well spent</div>
        </div>
      </div>`
  }
];

let current = 0;
let timerInterval = null;
let secondsLeft = 900;

function buildNav() {
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = slides.map((s, i) =>
    `<button class="nav-btn ${i===0?'active':''}" onclick="goTo(${i})">${s.tab}</button>`
  ).join('');
}

function renderSlide(i) {
  const s = slides[i];
  document.getElementById('content-area').innerHTML = `
    <div class="slide active">
      <div class="time-badge">${s.time}</div>
      <div class="slide-title">${s.title}</div>
      <div class="slide-hook">"${s.hook}"</div>
      ${s.content}
    </div>`;
  document.getElementById('slide-count').textContent = `${i+1} / ${slides.length}`;
  document.getElementById('progress').style.width = `${((i+1)/slides.length)*100}%`;
  document.querySelectorAll('.nav-btn').forEach((b,j) => b.classList.toggle('active', j===i));
}

function goTo(i) { current = i; renderSlide(i); }
function nextSlide() { if (current < slides.length - 1) goTo(current + 1); }
function prevSlide() { if (current > 0) goTo(current - 1); }

function startTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; return; }
  timerInterval = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) { secondsLeft = 0; clearInterval(timerInterval); }
    const m = Math.floor(secondsLeft/60);
    const s = secondsLeft % 60;
    document.getElementById('clock').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (secondsLeft < 120) document.getElementById('clock').style.color = '#E8906A';
  }, 1000);
}

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  secondsLeft = 900;
  document.getElementById('clock').textContent = '15:00';
  document.getElementById('clock').style.color = '';
}

buildNav();
renderSlide(0);
</script>
</body>
</html>
